<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Form</title>
<link rel="shortcut icon" href="mylogo.png" type="image/x-icon">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(90deg, rgb(96, 219, 236),blue);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.feedback-box{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.feedback-box h2{
    text-align:center;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="feedback-box">

<h2>Feedback</h2>

<form action="https://formspree.io/f/xeeylerb" method="POST">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email">

<textarea
name="feedback"
placeholder="Write your feedback..."
required></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>
</html>
