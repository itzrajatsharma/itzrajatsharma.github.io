
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Type Rush - TypeWeb</title>
    <link rel="shortcut icon" href="mylogo.png" type="image/png">
</head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #050505;
            color: white;
            font-family: monospace;
            overflow: hidden;
            overflow-y: auto;
        }
        body::-webkit-scrollbar{
            display: none;
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* TOP BAR */

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border: 1px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 15px #00ff88;
        }

        .logo {
            font-size: 24px;
            color: #00ff88;
            font-weight: bold;
        }

        .game-name {
            font-size: 22px;
        }

        /* STATS */

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            border: 1px solid #00ff88;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
        }

        .stat-title {
            color: #aaa;
            font-size: 12px;
        }

        .stat-value {
            color: #00ff88;
            font-size: 22px;
            margin-top: 5px;
        }

        /* GAME AREA */

        .game-area {
            position: relative;
            flex: 1;
            border: 1px solid #00ff88;
            border-radius: 10px;
            overflow: hidden;
            background:
                linear-gradient(#111 1px, transparent 1px),
                linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .word {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 25px;
            color: white;
            white-space: nowrap;
            transition: top 0.05s linear;
        }

        .word.correct {
            color: #00ff88;
        }

        .word.wrong {
            color: red;
            animation: shake 0.2s;
        }

        @keyframes shake {
            0% {
                transform: translateX(-50%);
            }

            25% {
                transform: translateX(-55%);
            }

            50% {
                transform: translateX(-45%);
            }

            75% {
                transform: translateX(-55%);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .danger-zone {
            position: absolute;
            bottom: 70px;
            left: 0;
            width: 100%;
            border-top: 2px dashed red;
            text-align: center;
            color: red;
            padding-top: 5px;
        }

        /* INPUT */

        .input-area {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        #typingInput {
            width: 400px;
            padding: 14px;
            background: #111;
            border: 1px solid #00ff88;
            color: white;
            outline: none;
            text-align: center;
            font-size: 18px;
            border-radius: 8px;
        }

        /* GAME OVER */

        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .game-over-box {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 35px;
            border: 1px solid #00ff88;
            border-radius: 12px;
            box-shadow: 0 0 30px #00ff88;
        }

        .game-over-box h1 {
            color: #00ff88;
            margin-bottom: 25px;
        }

        .final-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .final-box {
            border: 1px solid #333;
            padding: 15px;
        }

        .final-box span {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
        }

        .final-box strong {
            color: #00ff88;
            font-size: 22px;
        }

        button {
            padding: 12px 25px;
            background: #00ff88;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        button:hover {
            box-shadow: 0 0 15px #00ff88;
        }
     .nav{
        height: 2vh;
        width: 100%;
     }
        .back{
            fill: aqua;
            position: absolute;
            top:3px;
           
          
         left: 2vw;
           
            
            
           
            width: 32px;
        }

        /* MOBILE */

        @media (max-width: 600px) {

            .game-container {
                padding: 10px;
               
            }

            .top-bar {
                padding: 12px;
            }

            .logo {
                font-size: 18px;
            }

            .game-name {
                font-size: 16px;
            }

            .stats {
                gap: 6px;
                margin: 10px 0;
            }

            .stat-box {
                padding: 8px 3px;
            }

            .stat-title {
                font-size: 9px;
            }

            .stat-value {
                font-size: 16px;
            }

            .word {
                font-size: 20px;
            }

            #typingInput {
                width: 90%;
                font-size: 16px;
            }
        }
  
    </style>
</head>

<body>
    <div class="nav"><svg class="back" onclick="window.location.href=`game.html`" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 243.58"><path fill-rule="nonzero" d="M138.43 243.58 0 122.84 140.47 0l20.92 23.91-94.92 83 445.53-.42v31.75l-445.54.41 92.89 81.02z"/></svg></div>

    <div class="game-container">

        <div class="top-bar">
            <div class="logo">TYPEWEB</div>
            <div class="game-name">TYPE RUSH</div>
        </div>

        <div class="stats">

            <div class="stat-box">
                <div class="stat-title">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">COMBO</div>
                <div class="stat-value" id="combo">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">TIME</div>
                <div class="stat-value" id="time">60</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">LIVES</div>
                <div class="stat-value" id="lives">❤️ ❤️ ❤️</div>
            </div>

        </div>

        <div class="game-area" id="gameArea">

            <div id="word" class="word"></div>

            <div class="danger-zone">
                DANGER ZONE
            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="typingInput"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder="Start typing..."
            >

        </div>

    </div>

    <div class="game-over" id="gameOver">

        <div class="game-over-box">

            <h1>GAME OVER</h1>

            <div class="final-stats">

                <div class="final-box">
                    <span>SCORE</span>
                    <strong id="finalScore">0</strong>
                </div>

                <div class="final-box">
                    <span>WPM</span>
                    <strong id="finalWpm">0</strong>
                </div>

                <div class="final-box">
                    <span>COMBO</span>
                    <strong id="finalCombo">0</strong>
                </div>

                <div class="final-box">
                    <span>ACCURACY</span>
                    <strong id="finalAccuracy">100%</strong>
                </div>

            </div>

            <button id="restartBtn">
                PLAY AGAIN
            </button>

        </div>

    </div>


    <script>

        /* WORD LIST */

        const words = [

            "keyboard",
            "computer",
            "javascript",
            "programming",
            "website",
            "developer",
            "internet",
            "function",
            "variable",
            "application",
            "technology",
            "database",
            "software",
            "algorithm",
            "interface",
            "responsive",
            "development",
            "challenge",
            "performance",
            "accuracy"

        ];


        /* ELEMENTS */

        const wordElement = document.getElementById("word");
        const gameArea = document.getElementById("gameArea");
        const typingInput = document.getElementById("typingInput");

        const scoreElement = document.getElementById("score");
        const comboElement = document.getElementById("combo");
        const timeElement = document.getElementById("time");
        const livesElement = document.getElementById("lives");

        const gameOverScreen = document.getElementById("gameOver");

        const finalScore = document.getElementById("finalScore");
        const finalWpm = document.getElementById("finalWpm");
        const finalCombo = document.getElementById("finalCombo");
        const finalAccuracy = document.getElementById("finalAccuracy");

        const restartBtn = document.getElementById("restartBtn");


        /* GAME VARIABLES */

        let currentWord = "";

        let score = 0;

        let combo = 0;

        let bestCombo = 0;

        let lives = 3;

        let time = 60;

        let correctCharacters = 0;

        let totalCharacters = 0;

        let gameStarted = false;

        let gameEnded = false;

        let wordPosition = 20;

        let fallingSpeed = 0.5;

        let gameTimer;

        let wordTimer;


        /* RANDOM WORD */

        function getRandomWord() {

            const randomIndex =
                Math.floor(Math.random() * words.length);

            return words[randomIndex];

        }


        /* SHOW NEW WORD */

        function showNewWord() {

            currentWord = getRandomWord();

            wordElement.textContent = currentWord;

            wordElement.classList.remove("wrong");

            wordPosition = 20;

            wordElement.style.top = wordPosition + "px";

            typingInput.value = "";

        }


        /* START GAME */

        function startGame() {

            if (gameStarted) return;

            gameStarted = true;

            showNewWord();

            gameTimer = setInterval(updateTime, 1000);

            wordTimer = setInterval(moveWord, 50);

        }


        /* MOVE WORD */

        function moveWord() {

            if (gameEnded) return;

            wordPosition += fallingSpeed;

            wordElement.style.top = wordPosition + "px";


            const dangerPosition =
                gameArea.clientHeight - 100;


            if (wordPosition >= dangerPosition) {

                loseLife();

                showNewWord();

            }

        }


        /* CHECK TYPING */

        typingInput.addEventListener("input", function () {

            if (gameEnded) return;

            startGame();

            const typedText = typingInput.value;

            const currentIndex = typedText.length - 1;

            const typedCharacter =
                typedText[currentIndex];

            const expectedCharacter =
                currentWord[currentIndex];


            if (typedCharacter === expectedCharacter) {

                correctCharacters++;

                totalCharacters++;

                if (typedText === currentWord) {

                    completeWord();

                }

            } else {

                totalCharacters++;

                typingInput.value =
                    typedText.slice(0, -1);

                wordElement.classList.add("wrong");

                setTimeout(() => {

                    wordElement.classList.remove("wrong");

                }, 200);

                combo = 0;

                comboElement.textContent = combo;

            }

        });


        /* COMPLETE WORD */

        function completeWord() {

            score += 100 + (combo * 10);

            combo++;

            if (combo > bestCombo) {

                bestCombo = combo;

            }

            scoreElement.textContent = score;

            comboElement.textContent = combo;

            fallingSpeed += 0.05;

            showNewWord();

        }


        /* LOSE LIFE */

        function loseLife() {

            lives--;

            updateLives();

            combo = 0;

            comboElement.textContent = combo;

            if (lives <= 0) {

                endGame();

            }

        }


        /* UPDATE LIVES */

        function updateLives() {

            if (lives === 3) {

                livesElement.textContent =
                    "❤️ ❤️ ❤️";

            } else if (lives === 2) {

                livesElement.textContent =
                    "❤️ ❤️ 🖤";

            } else if (lives === 1) {

                livesElement.textContent =
                    "❤️ 🖤 🖤";

            } else {

                livesElement.textContent =
                    "🖤 🖤 🖤";

            }

        }


        /* UPDATE TIME */

        function updateTime() {

            time--;

            timeElement.textContent = time;

            if (time <= 0) {

                endGame();

            }

        }


        /* END GAME */

        function endGame() {

            gameEnded = true;

            clearInterval(gameTimer);

            clearInterval(wordTimer);

            typingInput.disabled = true;

            const minutesPlayed =
                (60 - time) / 60;

            let wpm = 0;

            if (minutesPlayed > 0) {

                wpm = Math.round(
                    (correctCharacters / 5) /
                    minutesPlayed
                );

            }

            let accuracy = 0;

            if (totalCharacters > 0) {

                accuracy = Math.round(
                    (correctCharacters /
                        totalCharacters) * 100
                );

            }

            finalScore.textContent = score;

            finalWpm.textContent = wpm;

            finalCombo.textContent = bestCombo;

            finalAccuracy.textContent =
                accuracy + "%";

            gameOverScreen.style.display = "flex";

        }


        /* RESTART GAME */

        restartBtn.addEventListener("click", function () {

            score = 0;

            combo = 0;

            bestCombo = 0;

            lives = 3;

            time = 60;

            correctCharacters = 0;

            totalCharacters = 0;

            gameStarted = false;

            gameEnded = false;

            fallingSpeed = 0.5;

            scoreElement.textContent = 0;

            comboElement.textContent = 0;

            timeElement.textContent = 60;

            updateLives();

            typingInput.disabled = false;

            gameOverScreen.style.display = "none";

            showNewWord();

            typingInput.focus();

        });


        /* START INITIAL WORD */

        showNewWord();

        typingInput.focus();

    </script>

</body>

</html>
